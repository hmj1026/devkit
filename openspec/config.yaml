schema: spec-driven

context: |
  Package: hmj1026/devkit — a generic PHP/Laravel toolkit published to Packagist.
  v1 PHP floor: ^7.2.5 || ^8.0; v2 (later) bumps to ^8.1.
  Laravel range: ^6.0 || ^7.0 || ^8.0 || ^9.0 || ^10.0 || ^11.0 (composer auto-resolves per PHP).
  Namespace: Devkit\Core\*, Devkit\Database\*, Devkit\Http\*, Devkit\Storage\*,
    Devkit\Search\*, Devkit\Messaging\*, Devkit\Logging\*, Devkit\Ui\* for the
    framework-agnostic core (no Illuminate\* imports); Devkit\Laravel\* for the
    Laravel glue (no Bridge\* sub-namespace — Laravel IS the implementation here).
  Pinned hard deps: monolog ^2.9, guzzle ^7.0, league/flysystem ^2 || ^3,
    elasticsearch ^7.17, butschster/meta-tags ^2.1, jenssegers/agent ^2.0.
  Testing: dual PHPUnit testsuites — `core` (pure PHP) + `laravel` (Orchestra Testbench).
  CI: GitHub Actions matrix in .github/workflows/tests.yml covering every valid
    PHP × Laravel cell. Incompatible cells (e.g. PHP 7.2 + Laravel 9) excluded.
  Local validation: docker_run stack provides posdev_php (PHP 7.4 floor, Xdebug
    3.1.6) bind-mounted at /var/www/devkit; CI is still the authoritative gate.
  Spec/code style: code uses PHP 5.6-syntax-safe constructs even inside the
    7.2+ range (no typed return types, no `??`, no anonymous classes) so module
    code stays readable and the compatibility floor is dictated by deps, not syntax.

