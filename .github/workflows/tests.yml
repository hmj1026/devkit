name: Tests

on:
  push:
    branches: [master, develop, 'feature/**', 'release/**']
    tags: ['v*']
  pull_request:
    branches: [master, develop, 'feature/**', 'release/**']

jobs:
  test:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # PHP 7.3 → Laravel 6, 7, 8 (PHP 7.2 excluded: elasticsearch/elasticsearch ^7.17 floors at PHP 7.3)
          - { php: '7.3', laravel: '6.*', testbench: '4.*', phpunit: '^8.5 || ^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '7.3', laravel: '7.*', testbench: '5.*', phpunit: '^8.5 || ^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '7.3', laravel: '8.*', testbench: '6.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          # PHP 7.4 → Laravel 6, 7, 8
          - { php: '7.4', laravel: '6.*', testbench: '4.*', phpunit: '^8.5 || ^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '7.4', laravel: '7.*', testbench: '5.*', phpunit: '^8.5 || ^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '7.4', laravel: '8.*', testbench: '6.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          # PHP 8.0 → Laravel 6, 7, 8, 9 (Laravel 6/7 top out at PHP 8.0)
          - { php: '8.0', laravel: '6.*', testbench: '4.*', phpunit: '^8.5 || ^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '8.0', laravel: '7.*', testbench: '5.*', phpunit: '^8.5 || ^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '8.0', laravel: '8.*', testbench: '6.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '8.0', laravel: '9.*', testbench: '7.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          # PHP 8.1 → Laravel 8, 9, 10  (Laravel 10 requires monolog ^3.0)
          - { php: '8.1', laravel: '8.*', testbench: '6.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '8.1', laravel: '9.*', testbench: '7.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '8.1', laravel: '10.*', testbench: '8.*', phpunit: '^9.6 || ^10.0', monolog: '^3.0', meta_tags: '^2.1' }
          # PHP 8.2 → Laravel 9, 10, 11  (Laravel 10/11 require monolog ^3.0; Laravel 11 requires butschster/meta-tags ^3.0)
          - { php: '8.2', laravel: '9.*', testbench: '7.*', phpunit: '^9.6', monolog: '^2.9', meta_tags: '^2.1' }
          - { php: '8.2', laravel: '10.*', testbench: '8.*', phpunit: '^9.6 || ^10.0', monolog: '^3.0', meta_tags: '^2.1' }
          - { php: '8.2', laravel: '11.*', testbench: '9.*', phpunit: '^10.5 || ^11.0', monolog: '^3.0', meta_tags: '^3.0' }
          # PHP 8.3 → Laravel 10, 11
          - { php: '8.3', laravel: '10.*', testbench: '8.*', phpunit: '^9.6 || ^10.0', monolog: '^3.0', meta_tags: '^2.1' }
          - { php: '8.3', laravel: '11.*', testbench: '9.*', phpunit: '^10.5 || ^11.0', monolog: '^3.0', meta_tags: '^3.0' }
          # PHP 8.4 → Laravel 11 (Laravel 11 supports PHP 8.2–8.4; needs PHPUnit ^11.0)
          - { php: '8.4', laravel: '11.*', testbench: '9.*', phpunit: '^11.0', monolog: '^3.0', meta_tags: '^3.0' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_sqlite, fileinfo, json
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Disable composer audit blocking (legacy matrix)
        run: composer config audit.block-insecure false

      - name: Install matrix dependencies
        run: |
          composer require --no-update \
            "monolog/monolog:${{ matrix.monolog }}" \
            "butschster/meta-tags:${{ matrix.meta_tags }}" \
            "psr/simple-cache:^1.0 || ^2.0"
          composer require --no-update --dev \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}"
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run core testsuite
        run: vendor/bin/phpunit --testsuite=core

      - name: Run laravel testsuite
        run: vendor/bin/phpunit --testsuite=laravel

  quality:
    name: Static analysis & coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_sqlite, fileinfo, json
          coverage: pcov
          # Bare tool name = latest stable (2.x). setup-php's tools: list takes
          # an exact version or none — a caret constraint (phpstan:^2.1) is not
          # parsed and yields a broken "Not Found" stub binary.
          tools: composer:v2, phpstan

      - name: Disable composer audit blocking
        run: composer config audit.block-insecure false

      # Pin the modern end of the matrix (PHP 8.2 · Laravel 11 · PHPUnit 11 ·
      # Monolog 3 · Flysystem 3) so the phpstan-baseline.neon stays faithful.
      - name: Install dependencies (Laravel 11 cell)
        # psr/simple-cache is pinned <3.0 deliberately: PSR-16 3.x typed
        # CacheInterface::set()/get() and the test fixture (InMemoryCache) +
        # phpstan-baseline entry for HttpUri.php track the <3.0 shape. Widening
        # this would break the baseline count and the core suite fixture.
        run: |
          composer require --no-update \
            "monolog/monolog:^3.0" \
            "butschster/meta-tags:^3.0" \
            "psr/simple-cache:^1.0 || ^2.0"
          composer require --no-update --dev \
            "laravel/framework:11.*" \
            "orchestra/testbench:9.*" \
            "phpunit/phpunit:^11.0" \
            "mockery/mockery:^1.6"
          composer update --prefer-dist --no-interaction --no-progress

      - name: PHPStan
        run: phpstan analyse --no-progress --memory-limit=512M

      # Use the PHPUnit 11 (<source>) schema config: PHPUnit 11 does not honour
      # the 9.x <coverage><include> element in the primary phpunit.xml.dist and
      # would process no coverage at all ("No filter is configured").
      - name: Tests with coverage
        run: vendor/bin/phpunit -c phpunit.coverage.xml.dist --coverage-clover=coverage.xml --coverage-text

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Tag-triggered GitHub Release. Gated behind the full matrix + quality job so a
  # v* tag can only publish from a commit where every cell is green. (Lives in
  # this workflow, not a separate file, because `needs:` only references jobs in
  # the same workflow.)
  release:
    name: Create GitHub Release
    needs: [test, quality]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
